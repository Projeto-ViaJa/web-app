
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaJá - Criar Conta</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/register/style.css">
</head>
<body>
    <div class="main-container">
        <div class="form-container">
            <div class="logo-container">
                <a href="../../index.html">
                    <img src="../../assets/logo.svg" alt="">
                </a>
            </div>
            <div class="form-sub-container">
                <div class="text-container">
                    <h2>Crie sua Conta</h2>
                </div>
                <form class="signup-form">
                    <div class="input-group">
                        <label for="text">Nome</label>
                        <input type="text" id="in_nome" name="nome" required onblur="validarNome()">
                        <p class="nome-error-message" style="display: none; color: red;"></p>
                    </div>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="in_email" name="email" required onblur="validarEmail()">
                        <p class="email-error-message" style="display: none; color: red;"></p>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Token</label>
                        <input type="text" id="in_token" name="token" required onblur="validarToken()">
                        <p class="token-error-message" style="display: none; color: red;"></p>
                    </div>
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="in_password" name="password" required onblur="validarSenha()">
                        <p class="password-error-message" style="display: none; color: red;"></p>
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Confirme a senha</label>
                        <input type="password" id="in_confirm_password" name="confirm-password" required onblur="confirmarSenha()">
                        <p class="confirm-password-error-message" style="display: none; color: red;"></p>
                    </div>
                    <div class="remember-container">
                        <div>
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Lembrar de mim</label>
                        </div>
                        <div>
                            <a href="#">Esqueceu sua senha?</a>
                        </div>
                    </div>
                    <button type="button" class="btn-signup" onclick="tryCadastrar()">Cadastrar</button>
                    <p class="already-account">Já possui uma conta? <a href="../login/index.html">Entrar agora.</a></p>
                </form>
            </div>
            <div class="footer">
                <span>Copyright 2026 ViaJá.</span>
            </div>
        </div>
        <div class="image-container">
            <div class="image-sub-container">
                <a class="inicio-link" href="../../index.html">Início</a>
            </div>
        </div>
    </div>
</body>
</html>
<script src="../../scripts/cadastrar/cadastrar.js"></script>
