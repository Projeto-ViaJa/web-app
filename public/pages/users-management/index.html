    <nav class="navegacao">

      <a href="../calendario/index.html" class="nav-item">

          </svg>
        </span>
        Sair
      </a>

  </aside>
  <main class="conteudo">
    <div class="cabecalho-pagina">
      <h1 class="titulo-pagina">Gerenciamento de <strong>Usuários</strong></h1>
      <span><img src="../../assets/logo.svg" alt=""></span>
    </div>
    <div class="secao-busca">
      <div class="titulo-busca">Pesquisar usuários</div>

      <div class="barra-busca">
        <div class="campo-busca-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="campo-busca" type="text" placeholder="" id="campoBusca"/>
        </div>
        <button class="botao botao-escuro" onclick="filtrarTabela()">Filtrar</button>
        <button class="botao botao-claro"  onclick="limparFiltro()">Limpar Filtros</button>
      </div>
    </div>
    <div class="wrapper-tabela">
      <table class="tabela-dados" id="tabelaUsuarios">
        <thead>
          <tr>
            <th>E-mail</th>
            <th>Empresa</th>
            <th>Status</th>
            <th>Data</th>
            <th>Permissão</th>
            <th>Nível</th>
            <th class="th-acoes">Ações</th>
          </tr>
        </thead>
        <tbody id="linhasUsuarios">
        </tbody>
      </table>
    </div>

  </main>
  <div class="overlay" id="overlay" onclick="fecharModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-cabecalho">
      <h2 class="modal-titulo">Editar Usuário</h2>
      <button class="modal-fechar" onclick="fecharModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-corpo">
      <label class="campo-label">E-mail
        <input class="campo-input" type="email" id="editEmail"/>
      </label>
      <label class="campo-label">Empresa
        <input class="campo-input" type="text" id="editEmpresa"/>
      </label>
      <label class="campo-label">Status
        <select class="campo-input" id="editStatus">
          <option value="Ativo">Ativo</option>
          <option value="Inativo">Inativo</option>
        </select>
      </label>
      <label class="campo-label">Permissão
        <select class="campo-input" id="editPermissao">
          <option value="Usuário">Usuário</option>
          <option value="Administrador">Administrador</option>
        </select>
      </label>
      <label class="campo-label">Nível
        <input class="campo-input" type="number" min="1" max="5" id="editNivel"/>
      </label>
    </div>
    <div class="modal-rodape">
      <button class="botao botao-claro" onclick="fecharModal()">Cancelar</button>
      <button class="botao botao-escuro" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>

  <script>
    let usuarios = [];
    let listaFiltrada = [];
    let editandoId = null;
    async function fetchUsuarios() {
      try {
        const response = await fetch('/usuarios/listar');
        if (!response.ok) throw new Error('Erro ao buscar usuários');
        usuarios = await response.json();
        usuarios = usuarios.map(u => ({
          id: u.id_usuario,
          email: u.email_usuario,
          empresa: u.empresa,
          status: u.ativo ? 'Ativo' : 'Inativo',
          data: '',
          permissao: 'Usuário',
          nivel: u.nivel,
          ativo: u.ativo
        }));
        listaFiltrada = [...usuarios];
        renderizar(listaFiltrada);
      } catch (error) {
        console.error(error);
        mostrarToast('Erro ao carregar usuários.');
      }
    }

    async function editarUsuario(id, dados) {
      try {
        const response = await fetch('/usuarios/editar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            idServer: id,
            nomeServer: '',
            emailServer: dados.email,
            senhaServer: '',
            fkEmpresaServer: 1,
            ativoServer: dados.ativo,
            permissaoServer: dados.permissao,
            nivelServer: dados.nivel
          })
        });
        if (!response.ok) throw new Error('Erro ao editar');
        await fetchUsuarios();
        mostrarToast('Usuário editado com sucesso!');
      } catch (error) {
        console.error(error);
        mostrarToast('Erro ao editar usuário.');
      }
    }
    function renderizar(lista) {
      const tbody = document.getElementById('linhasUsuarios');
      tbody.innerHTML = '';

      lista.forEach(u => {
        const tr = document.createElement('tr');
        if (!u.ativo) tr.classList.add('linha-desativada');

        tr.innerHTML = `
          <td>${u.email}</td>
          <td>${u.empresa}</td>
          <td><span class="badge-status ${u.status === 'Ativo' ? 'ativo' : 'inativo'}">${u.status}</span></td>
          <td>${u.data}</td>
          <td>${u.permissao}</td>
          <td>${u.nivel}</td>
          <td class="td-acoes">
            <button class="botao-acao editar"    onclick="abrirModal(${u.id})">Editar</button>
            <button class="botao-acao ${u.ativo ? 'desativar' : 'reativar'}"
                    onclick="toggleAtivo(${u.id})">
              ${u.ativo ? 'Desativar' : 'Reativar'}
            </button>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    fetchUsuarios();

    function filtrarTabela() {
      const busca = document.getElementById('campoBusca').value.toLowerCase();
      listaFiltrada = usuarios.filter(u =>
        Object.values(u).some(v => String(v).toLowerCase().includes(busca))
      );
      renderizar(listaFiltrada);
    }

    function limparFiltro() {
      document.getElementById('campoBusca').value = '';
      listaFiltrada = [...usuarios];
      renderizar(listaFiltrada);
    }

    document.getElementById('campoBusca').addEventListener('keyup', e => {
      if (e.key === 'Enter') filtrarTabela();
    });

    function toggleAtivo(id) {
      const u = usuarios.find(x => x.id === id);
      if (u) {
        const novoAtivo = !u.ativo;
        editarUsuario(id, { email: u.email, ativo: novoAtivo, permissao: u.permissao, nivel: u.nivel });
      }
    }

    function abrirModal(id) {
      const u = usuarios.find(x => x.id === id);
      if (!u) return;
      editandoId = id;
      document.getElementById('editEmail').value     = u.email;
      document.getElementById('editEmpresa').value   = u.empresa;
      document.getElementById('editStatus').value    = u.status;
      document.getElementById('editPermissao').value = u.permissao;
      document.getElementById('editNivel').value     = u.nivel;
      document.getElementById('modal').classList.add('aberto');
      document.getElementById('overlay').classList.add('aberto');
    }

    function fecharModal() {
      document.getElementById('modal').classList.remove('aberto');
      document.getElementById('overlay').classList.remove('aberto');
      editandoId = null;
    }

    function salvarEdicao() {
      const dados = {
        email:     document.getElementById('editEmail').value.trim(),
        empresa:   document.getElementById('editEmpresa').value.trim(),
        ativo:     document.getElementById('editStatus').value === 'Ativo',
        permissao: document.getElementById('editPermissao').value,
        nivel:     Number(document.getElementById('editNivel').value)
      };
      if (!dados.email) {
        mostrarToast('Preencha o email.');
        return;
      }
      editarUsuario(editandoId, dados);
      fecharModal();
    }

    function mostrarToast(mensagem) {
      alert(mensagem);
    }
  </script>

</body>
</html>
